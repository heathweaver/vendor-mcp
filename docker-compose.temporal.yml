version: '3.8'

services:
  cassandra:
    image: cassandra:4.0
    ports:
      - "9042:9042"

  temporal:
    image: temporalio/auto-setup:1.23.0
    ports:
      - "7233:7233"
    environment:
      - DB=cassandra
      - CASSANDRA_SEEDS=cassandra
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/development.yaml
    depends_on:
      - cassandra

  temporal-ui:
    image: temporalio/ui:2.23.0
    ports:
      - "8080:8080"
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    depends_on:
      - temporal
