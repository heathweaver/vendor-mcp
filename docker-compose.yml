services:
  vendor-mcp-server:
    build:
      context: .
      dockerfile: mcp/Dockerfile
    container_name: vendor-mcp-server
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8767:8765"
    environment:
      - PORT=8765
      - PGHOST=${PGHOST}
      - PGPORT=${PGPORT}
      - PGUSER=${PGUSER}
      - PGPASSWORD=${PGPASSWORD}
      - PGDATABASE=${PGDATABASE}
      - MCP_PUBLIC_URL=${MCP_PUBLIC_URL}
      - REQUIRE_AUTH=${REQUIRE_AUTH}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
    volumes:
      - cloudflared-certs:/root/.cloudflared
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8765/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

volumes:
  cloudflared-certs:

